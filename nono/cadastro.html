<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="cad">
        <h1>Cadastrar</h1>
    <form class="form" action="formulario">
        <input class="entrada"id="nome" type="name" placeholder="Nome">
        <input class="entrada"id="sobrenome" type="text" placeholder="Sobrenome">
        <input class="entrada"id="email" type="email" placeholder="Email">
        <input class="entrada"id="tel" type="tel" placeholder="Telefone">
        <input class="entrada"id="cida" type="text" placeholder="Cidade">
        <input class="entrada"id="profi" type="text" placeholder="Profissão">
        <input class="btn"type="button" value="Cadastrar" onclick="cadastro()">
    </form>
    </div>
    <p id="check"></p>
    <script src="cadastro.js"></script>
</body>
</html>
